<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Boss - AI-Powered Image Tools</title>
  <meta name="description" content="Free, private image processing tools powered by AI. Background removal, upscaling, style transfer, and more - all processed locally in your browser." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/main.css" />
  <link rel="stylesheet" href="/chat.css" />
</head>
<body>
  <div id="app">
    <!-- Navigation -->
    <nav id="nav">
      <div class="nav-brand">
        <span class="brand-icon">⚡</span>
        <span class="brand-text">Image Boss</span>
      </div>
      <div id="nav-services" class="nav-services">
        <!-- Services will be dynamically inserted -->
      </div>
    </nav>

    <!-- Main Content -->
    <main id="main">
      <!-- Status Bar -->
      <div id="status-bar" class="status-bar hidden">
        <div class="progress-container">
          <div class="progress-fill"></div>
        </div>
        <span class="progress-text">Ready</span>
      </div>

      <!-- Upload Area -->
      <div id="upload-area" class="upload-area">
        <div class="upload-content">
          <div class="upload-icon">📁</div>
          <h2>Drop your image here</h2>
          <p>or click to browse</p>
          <p class="upload-hint">Supports PNG, JPEG, WebP</p>
        </div>
        <input type="file" id="file-input" accept="image/*" hidden />
      </div>

      <!-- Workspace (hidden until image loaded) -->
      <div id="workspace" class="workspace hidden">
        <!-- Image Preview -->
        <div class="preview-container">
          <div class="preview-panel">
            <span class="preview-label">Original</span>
            <div class="preview-image-wrapper">
              <canvas id="original-canvas"></canvas>
            </div>
          </div>
          <div class="preview-panel">
            <span class="preview-label">Result</span>
            <div class="preview-image-wrapper" id="result-wrapper">
              <canvas id="result-canvas"></canvas>
              <div id="result-placeholder" class="result-placeholder">
                <span>Click "Process" to see results</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Layer Picker -->
        <div id="layer-picker" class="layer-picker hidden">
          <label class="picker-label">Select Object to Extract</label>
          <div id="layers-container" class="layers-container"></div>
        </div>

        <!-- Controls -->
        <div id="controls" class="controls">
          <!-- Dynamic controls per service -->
        </div>

        <!-- Actions -->
        <div class="actions">
          <button id="btn-new" class="btn btn-secondary">New Image</button>
          <button id="btn-process" class="btn btn-primary">Process</button>
          <button id="btn-download" class="btn btn-secondary" disabled>Download</button>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
